name: reusable workflow

on: 
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
        default: 'lts/*'

jobs:
  run-npm-test:
    runs-on: self-hosted

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: run test
        run: |
          node -v
          npm install